<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Estate Referrals - Clayton VanTol</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1200px;
            height: 630px;
            font-family: 'Source Sans 3', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3a5f 0%, #2c5282 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
        }
        .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 900px;
        }
        .left {
            flex: 1;
        }
        .badge {
            display: inline-block;
            background: #c9a227;
            color: #1e3a5f;
            padding: 10px 24px;
            border-radius: 2px;
            font-size: 15px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 22px;
        }
        .title {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 68px;
            font-weight: 700;
            color: #ffffff;
            line-height: 1.1;
            margin-bottom: 14px;
        }
        .title span {
            color: #c9a227;
        }
        .subtitle {
            font-size: 28px;
            color: rgba(255,255,255,0.85);
            margin-bottom: 34px;
            max-width: 520px;
        }
        .contact {
            display: flex;
            gap: 40px;
        }
        .contact-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(255,255,255,0.8);
            font-size: 20px;
        }
        .contact-item svg {
            width: 24px;
            height: 24px;
            fill: #c9a227;
        }
        .right {
            flex-shrink: 0;
            margin-left: 20px;
        }
        .logo-box {
            width: 200px;
            height: 200px;
            background: #faf8f5;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .exp-text {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 52px;
            font-weight: 700;
            color: #1e3a5f;
            line-height: 1;
        }
        .exp-text span {
            color: #c9a227;
        }
        .tagline {
            margin-top: 14px;
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left">
            <div class="badge">Trusted Referrals</div>
            <h1 class="title">Real Estate<br><span>Referrals</span></h1>
            <p class="subtitle">Get matched with vetted local eXp agents</p>
            <div class="contact">
                <div class="contact-item">
                    <svg viewBox="0 0 16 16">
                        <path d="M7 7a1 1 0 0 1 2 0v1H7V7zM6 9.3c0-.042.02-.107.105-.175A.637.637 0 0 1 6.5 9h3a.64.64 0 0 1 .395.125c.085.068.105.133.105.175v2.4c0 .042-.02.107-.105.175A.637.637 0 0 1 9.5 12h-3a.637.637 0 0 1-.395-.125C6.02 11.807 6 11.742 6 11.7V9.3z"/> <path d="M9.293 0H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V4.707A1 1 0 0 0 13.707 4L10 .293A1 1 0 0 0 9.293 0zM9.5 3.5v-2l3 3h-2a1 1 0 0 1-1-1zM10 7v1.076c.54.166 1 .597 1 1.224v2.4c0 .816-.781 1.3-1.5 1.3h-3c-.719 0-1.5-.484-1.5-1.3V9.3c0-.627.46-1.058 1-1.224V7a2 2 0 1 1 4 0z"/>
                    </svg>
                    <span></span>https://claytonvantol.us</span>
                </div>
                <div class="contact-item">
                    <svg viewBox="0 0 24 24">
                        <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
                    </svg>
                    <span>clayton.vantol@expreferral.com</span>
                </div>
            </div>
        </div>
        <div class="right">
            <div class="logo-box">
                <div class="exp-text"><span>eXp</span></div>
            </div>
            <div class="tagline">Real Estate Referrals</div>
        </div>
    </div>
</body>
</html>
